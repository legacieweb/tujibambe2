services:
  - type: web
    name: tujibambe-backend
    runtime: node
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        fromDatabase:
          name: tujibambe-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  - type: web
    name: tujibambe-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: tujibambe-db
    engine: mongodb
    plan: free